<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <!-- Meta -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Title -->
    <title>
        {% block title %}Dashboard | SpeakAI{% endblock %}
    </title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Dashboard CSS -->
    <link rel="stylesheet" href="{{ url_for('static', path='css/dashboard.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/chat.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/dashboard-modern.css') }}">
</head>

<body class="dashboard-body">
    <!-- Page Shell -->
    <div class="dashboard-shell">
        <!-- Left Sidebar -->
        <aside id="dashboardSidebar" class="dashboard-sidebar" aria-label="Sidebar navigation">
            {% include "partials/sidebar.html" %}
        </aside>

        <!-- Main Workspace -->
        <div class="dashboard-workspace">
            {% include "partials/topbar.html" %}

            <main class="dashboard-main-content" tabindex="-1">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-nav d-xl-none" aria-label="Mobile navigation">
        <a href="/dashboard" class="mobile-nav-link active" aria-label="Chat">
            <i class="bi bi-chat-dots"></i>
            <span>Chat</span>
        </a>
        <a href="#" class="mobile-nav-link" aria-label="Practice">
            <i class="bi bi-mic"></i>
            <span>Practice</span>
        </a>
        <a href="#" class="mobile-nav-link" aria-label="Progress">
            <i class="bi bi-bar-chart"></i>
            <span>Progress</span>
        </a>
        <a href="#" class="mobile-nav-link" aria-label="Profile">
            <i class="bi bi-person"></i>
            <span>Profile</span>
        </a>
    </nav>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Dashboard Scripts -->
    <script src="{{ url_for('static', path='js/dashboard.js') }}"></script>
    <script src="{{ url_for('static', path='js/chat.js') }}"></script>
</body>

</html>
