<!-- Voice Assistant Card -->
<article class="premium-card voice-assistant-card">
    <div class="d-flex justify-content-between align-items-center mb-2">
        <h2 class="h6 mb-0">AI Voice Assistant</h2>
        <span class="online-dot">Online</span>
    </div>

    <p class="text-muted small mb-3">Click the microphone and start speaking.</p>

    <div class="assistant-wave" aria-hidden="true"></div>

    <div class="d-flex justify-content-center gap-3 mt-3">
        <button class="btn btn-icon" aria-label="Headset"><i class="bi bi-headset"></i></button>
        <button class="btn btn-icon" aria-label="Microphone"><i class="bi bi-mic-fill"></i></button>
        <button class="btn btn-icon" aria-label="Audio settings"><i class="bi bi-sliders"></i></button>
    </div>
</article>
