<!-- Grammar Suggestions Card -->
<article class="premium-card grammar-card">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="h6 mb-0">Grammar Suggestions</h2>
        <span class="badge text-bg-light">{{ suggestions | length }}</span>
    </div>

    <ul class="list-unstyled mb-2 d-grid gap-2">
        {% for item in suggestions %}
        <li class="suggestion-item">
            <i class="bi bi-x-circle text-danger"></i>
            <span class="wrong">{{ item.wrong }}</span>
            <i class="bi bi-arrow-right"></i>
            <span class="right">{{ item.right }}</span>
        </li>
        {% endfor %}
    </ul>

    <a href="#" class="view-link">View all suggestions <i class="bi bi-arrow-right"></i></a>
</article>
